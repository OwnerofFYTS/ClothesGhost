<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horror House Exploration</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-family: sans-serif;
            background: rgba(0, 0, 0, 0.7);
            padding: 12px 24px;
            border-radius: 5px;
            text-align: center;
            pointer-events: none;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div id="instructions">Screen par Click karein aur WASD se ghar ke andar chalein</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // 1. Scene, Camera, aur Renderer Setup
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050505, 0.03); 

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 15); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // 2. WASD Movement Controls
        const controls = new PointerLockControls(camera, document.body);
        document.body.addEventListener('click', () => { controls.lock(); });

        const moveSpeed = 0.2; 
        const keys = { w: false, a: false, s: false, d: false };

        window.addEventListener('keydown', (e) => { if (e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { if (e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = false; });

        // 3. Lighting (Horror Flashlight)
        const ambientLight = new THREE.AmbientLight(0x111122, 0.4); 
        scene.add(ambientLight);

        const flashLight = new THREE.SpotLight(0xffffff, 8, 40, Math.PI / 5, 0.5, 1);
        scene.add(flashLight);
        scene.add(flashLight.target);

        // 4. Load Haunted House
        const loader = new GLTFLoader();
        loader.load(
            'haunted_house.glb', 
            function (gltf) {
                const house = gltf.scene;
                house.position.set(0, 0, 0);
                scene.add(house);
                console.log("House successfully loaded!");
            },
            undefined,
            function (error) { 
                console.error('House load nahi hua! Check path aur file name.', error); 
            }
        );

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 5. Game Loop
        function animate() {
            requestAnimationFrame(animate);

            if (controls.isLocked) {
                if (keys.w) controls.moveForward(moveSpeed);
                if (keys.s) controls.moveForward(-moveSpeed);
                if (keys.a) controls.moveRight(-moveSpeed);
                if (keys.d) controls.moveRight(moveSpeed);
            }

            // Flashlight movement
            flashLight.position.copy(camera.position);
            const targetPosition = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion).add(camera.position);
            flashLight.target.position.copy(targetPosition);

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
