<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horror Ghost Escape</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Courier New', Courier, monospace;
        }
        #ui, #loading, #gameover, #instructions {
            position: absolute;
            color: white;
            user-select: none;
            pointer-events: none;
            text-align: center;
        }
        #ui {
            top: 20px; left: 20px; font-size: 18px; text-align: left;
            text-shadow: 2px 2px 4px #000;
            z-index: 10;
        }
        #instructions {
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 24px; background: rgba(0,0,0,0.85); padding: 30px;
            border: 2px solid #ff3333; pointer-events: auto; cursor: pointer;
            z-index: 10; border-radius: 8px;
        }
        #loading { top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 20px; z-index: 10; }
        #gameover {
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 48px; color: #ff0000; display: none; font-weight: bold;
            text-shadow: 0 0 10px #000; z-index: 12;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="loading">Loading Ghost Model...</div>
    <div id="ui">
        Flashlight: <span id="flashlight-status" style="color:#ff3333; font-weight:bold;">ZAMEEN PAR HAI (Look down & Press 'E' to Pick)</span>
    </div>
    
    <div id="instructions">
        <h2>GHOST PURSUIT</h2>
        <p style="color: #ff3333; font-weight: bold;">CLICK HERE TO START</p>
        <p style="font-size: 16px; color: #aaa; text-align: left; line-height: 1.6;">
            • <b>WASD</b> = Move Around<br>
            • <b>Mouse</b> = Look Around (Look down at your feet!)<br>
            • <b>E</b> = Pick Flashlight (When close to it)<br>
            • <b>ESC</b> = Pause Game & Release Mouse
        </p>
    </div>

    <div id="gameover">YOU DIED!</div>

    <script>
        let scene, camera, renderer, clock;
        let ghost = null, mixer = null;
        let flashlight = null, flashlightDropped = null, flashlightGlow = null;
        let hasFlashlight = false;
        let isGameOver = false;
        let isPaused = true;

        // Player starting state
        const player = {
            pos: new THREE.Vector3(0, 1.6, 5), 
            speed: 0.1
        };

        const keys = { w: false, a: false, s: false, d: false, e: false };
        const ghostSpeed = 0.04; 
        const killDistance = 1.2; 

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x0a0505, 0.08); 

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.copy(player.pos);
            
            // --- CRITICAL FIX FOR TILT ---
            // 'YXZ' order lagane se camera pehle left-right (Y) ghoomega, fir up-down (X). 
            // Is se Z-axis (tilt) bilkul lock ho jati hai aur screen kabi tedi nahi hoti.
            camera.rotation.order = 'YXZ';

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            clock = new THREE.Clock();

            // Lighting
            const ambient = new THREE.AmbientLight(0x221111); 
            scene.add(ambient);

            const overheadLight = new THREE.DirectionalLight(0x334455, 0.5);
            overheadLight.position.set(0, 20, 0);
            scene.add(overheadLight);

            // Ground
            const floorGeo = new THREE.PlaneGeometry(200, 200);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // Flashlight on Ground
            const flashGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.5, 12);
            const flashMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.8 });
            flashlightDropped = new THREE.Mesh(flashGeo, flashMat);
            flashlightDropped.rotation.z = Math.PI / 2;
            flashlightDropped.position.set(0, 0.1, 2); 
            scene.add(flashlightDropped);

            flashlightGlow = new THREE.PointLight(0x00ff00, 2, 3);
            flashlightGlow.position.copy(flashlightDropped.position);
            scene.add(flashlightGlow);

            // Spotlight Player Hand
            flashlight = new THREE.SpotLight(0xffffff, 8, 50, Math.PI / 4, 0.5, 1);
            flashlight.castShadow = true;
            flashlight.visible = false; 
            scene.add(flashlight);
            scene.add(flashlight.target); 

            // Load Ghost
            const loader = new THREE.GLTFLoader();
            loader.load('cloth_ghost.glb', (gltf) => {
                ghost = gltf.scene;
                ghost.position.set(0, 0, -12); 
                ghost.scale.set(0.85, 0.85, 0.85); 
                
                ghost.traverse((child) => {
                    if (child.isMesh) child.castShadow = true;
                });
                scene.add(ghost);

                if (gltf.animations && gltf.animations.length > 0) {
                    mixer = new THREE.AnimationMixer(ghost);
                    mixer.clipAction(gltf.animations[0]).play();
                }
                document.getElementById('loading').style.display = 'none';
            }, undefined, (err) => {
                console.error(err);
                document.getElementById('loading').innerText = "Model load nahi hua! Check path.";
            });

            // Event Listeners
            window.addEventListener('resize', onWindowResize);
            document.addEventListener('keydown', (e) => handleKeys(e, true));
            document.addEventListener('keyup', (e) => handleKeys(e, false));
            document.addEventListener('mousemove', onMouseMove);

            // Pointer Lock
            const inst = document.getElementById('instructions');
            inst.addEventListener('click', () => {
                if(!isGameOver) renderer.domElement.requestPointerLock();
            });

            document.addEventListener('pointerlockchange', () => {
                if (isGameOver) return;
                if (document.pointerLockElement === renderer.domElement) {
                    inst.style.display = 'none';
                    isPaused = false;
                } else {
                    inst.style.display = 'block';
                    isPaused = true;
                }
            });

            animate();
        }

        function handleKeys(e, isDown) {
            if (isGameOver) return;
            const key = e.key.toLowerCase();
            if (key === 'w') keys.w = isDown;
            if (key === 'a') keys.a = isDown;
            if (key === 's') keys.s = isDown;
            if (key === 'd') keys.d = isDown;
            if (key === 'e' && isDown && !hasFlashlight) {
                let dist = camera.position.distanceTo(flashlightDropped.position);
                if (dist < 3) {
                    hasFlashlight = true;
                    flashlight.visible = true;
                    scene.remove(flashlightDropped);
                    scene.remove(flashlightGlow);
                    document.getElementById('flashlight-status').innerText = "UTHA LI HAI (Active)";
                    document.getElementById('flashlight-status').style.color = "#00ff00";
                }
            }
        }

        // --- NEW SMOOTH & LOCKED MOUSE ROTATION ---
        function onMouseMove(e) {
            if (isPaused || isGameOver) return;

            // Direct camera ki rotation me add karein (Euler rotation tracking)
            camera.rotation.y -= e.movementX * 0.0025; // Yaw (Left / Right)
            camera.rotation.x -= e.movementY * 0.0025; // Pitch (Up / Down)

            // Look up aur look down par strict limit lagana taake camera flip na ho (90 degrees limit)
            camera.rotation.x = Math.max(-Math.PI / 2.1, Math.min(Math.PI / 2.1, camera.rotation.x));
            
            // Z-axis (Tilt) ko zyadati se zero pe enforce rakhna
            camera.rotation.z = 0;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function triggerGameOver() {
            isGameOver = true;
            document.exitPointerLock();
            
            document.getElementById('gameover').style.display = 'block';
            document.getElementById('instructions').style.display = 'none';

            // Death moment par camera ko instant straight line horizontally set karna
            camera.rotation.z = 0;
            camera.rotation.x = 0; 
            
            if (ghost) {
                camera.lookAt(ghost.position.x, ghost.position.y + 1, ghost.position.z);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            
            if (isGameOver) {
                renderer.render(scene, camera);
                return; 
            }
            
            if (isPaused) return;

            const delta = clock.getDelta();
            if (mixer) mixer.update(delta);

            // --- MOVEMENT RELATIVE TO FIXED CAMERA ---
            // Move direction vectors dynamically create karte hain camera angle se
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
            
            // Y component ko zero kar rahe hain taake player urhne ya zameen ke andar na ghuse chalte hue
            forward.y = 0; forward.normalize();
            right.y = 0; right.normalize();

            if (keys.w) player.pos.addScaledVector(forward, player.speed);
            if (keys.s) player.pos.addScaledVector(forward, -player.speed);
            if (keys.d) player.pos.addScaledVector(right, player.speed);
            if (keys.a) player.pos.addScaledVector(right, -player.speed);

            // Sync Player Pos to Camera
            camera.position.copy(player.pos);

            // Flashlight Position & Target Sync
            if (hasFlashlight) {
                flashlight.position.copy(camera.position);
                const flashDir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                flashlight.target.position.copy(camera.position).add(flashDir);
            }

            // Ghost AI
            if (ghost) {
                const dir = new THREE.Vector3().subVectors(player.pos, ghost.position);
                dir.y = 0; 
                dir.normalize();

                ghost.position.addScaledVector(dir, ghostSpeed);
                ghost.lookAt(player.pos.x, ghost.position.y, player.pos.z);
                ghost.position.y = 0.5 + Math.sin(clock.getElapsedTime() * 2) * 0.12;

                // Kill Distance check
                let distToPlayer = player.pos.distanceTo(ghost.position);
                if (distToPlayer < killDistance) {
                    triggerGameOver();
                }
            }

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
